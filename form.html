<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Activity</title>
    <meta name="description" content="Product review activity">
    <meta name="author" content="Robert McGrew">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <!-- CONTENT HERE -->
    <main>
        <form method="get" action="review.html" class="wf1">
            <fieldset class="product-select" required>
                <label>Product Name
                    <select name="products" id="products">
                        <option value="">Choose a Product...</option>
                        <option value="laptop">Laptop Pro 15"</option>
                        <option value="smartphone">Smartphone X200</option>
                        <option value="headphones">Wireless Noise-Canceling Headphones</option>
                        <option value="smartwatch">Smartwatch Series 5</option>
                        <option value="camera">Digital Camera 24MP</option>
                        <option value="tablet">Tablet Plus 10"</option>
                        <option value="printer">All-in-One Wireless Printer</option>
                        <option value="monitor">4K Ultra HD Monitor</option>
                        <option value="keyboard">Mechanical Gaming Keyboard</option>
                        <option value="speaker">Bluetooth Portable Speaker</option>
                    </select>

                <legend>Overall Rating</legend>
                <label><input type="radio" name="rating" value="1"> &star;</label>
                <label><input type="radio" name="rating" value="2"> &star;&star;</label>
                <label><input type="radio" name="rating" value="3"> &star;&star;&star;</label>
                <label><input type="radio" name="rating" value="4"> &star;&star;&star;&star;</label>
                <label><input type="radio" name="rating" value="5"> &star;&star;&star;&star;&star;</label>

                <label>Date of Installation<input type="date" name="completeDate"></label>


                <legend>Overall Rating</legend>
                <label><input type="checkbox" name="durability" value="durability"> Durability</label>
                <label><input type="checkbox" name="ease" value="ease">Ease of Use</label>
                <label><input type="checkbox" name="performace" value="performace">Performance</label>
                <label><input type="checkbox" name="design" value="design">Design</label>
                
                <label>Written Review<span class="optional">(Optional)</span><textarea name="written-review"></textarea><label>
                <label>Your Name<span class="optional">(Optional)</span><input type="text" name="users-name"></label>

            
            </fieldset>

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; 💻 <span id="currentYear"></span> Robert McGrew 💻</p>
        <p>United States</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
